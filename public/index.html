<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>PlusRent - Chirie Auto Chișinău</title>
  
  <!-- КРИТИЧНО: noindex — это fallback, не каноническая страница -->
  <meta name="robots" content="noindex, follow">
  
  <!-- Canonical указывает на правильную главную -->
  <link rel="canonical" href="https://plusrent.md/ro/">
  
  <!-- Meta refresh fallback (если JS отключен) -->
  <meta http-equiv="refresh" content="0; url=/ro/">
  
  <!-- Smart redirect по browser language -->
  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || 'ro').toLowerCase();
      var target = '/ro/';
      if (lang.indexOf('ru') === 0) target = '/ru/';
      else if (lang.indexOf('en') === 0) target = '/en/';
      window.location.replace(target);
    })();
  </script>
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <h1>PlusRent</h1>
  <p>Redirecting...</p>
  <p>
    <a href="/ro/">Română</a> | 
    <a href="/ru/">Русский</a> | 
    <a href="/en/">English</a>
  </p>
</body>
</html>
